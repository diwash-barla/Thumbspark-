<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Prompt Generator</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#020617;
border-bottom:1px solid #1e293b;
z-index:1000;
}

.logo{
height:36px;
}

.right{
display:flex;
gap:15px;
align-items:center;
}

.history-btn{
cursor:pointer;
font-size:22px;
}

.container{
padding:25px;
max-width:900px;
margin:auto;
}

textarea{
width:100%;
height:200px;
background:#020617;
border:1px solid #334155;
color:white;
padding:12px;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
background:#6366f1;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

.output{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:8px;
border:1px solid #334155;
white-space:pre-wrap;
}

.history-panel{
position:fixed;
right:-320px;
top:0;
height:100%;
width:320px;
background:#020617;
border-left:1px solid #334155;
padding:20px;
overflow:auto;
transition:0.3s;
}

.history-panel.active{
right:0;
}

.history-item{
border-bottom:1px solid #334155;
padding:10px 0;
font-size:14px;
}

</style>
</head>

<body>

<header>

<h3>Prompt Generator</h3>

<div class="right">

<div class="history-btn" onclick="toggleHistory()">🕘</div>

<img src="logo.png" class="logo">

</div>

</header>

<div class="container">

<h2>YouTube Script</h2>

<textarea id="scriptInput" placeholder="Paste your YouTube script..."></textarea>

<button onclick="generatePrompt()">Generate Prompt</button>

<div id="result" class="output"></div>

</div>

<div id="historyPanel" class="history-panel">

<h3>Prompt History</h3>

<div id="historyList"></div>

</div>

<script src="script.js"></script>

</body>
  </html>
