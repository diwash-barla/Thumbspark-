<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<title>Prompt Generator</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
}

header{
position:sticky;
top:0;
background:#020617;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1e293b;
}

.logo{
height:35px;
}

.container{
padding:20px;
}

textarea{
width:100%;
height:200px;
background:#020617;
color:white;
border:1px solid #334155;
border-radius:8px;
padding:10px;
}

button{
margin-top:10px;
padding:10px 15px;
background:#6366f1;
border:none;
border-radius:6px;
color:white;
}

.output{
margin-top:20px;
background:#020617;
padding:10px;
border-radius:8px;
border:1px solid #334155;
}

</style>

</head>

<body>

<header>

<h3>Prompt AI</h3>

<img src="logo.png" class="logo">

</header>

<div class="container">

<textarea id="scriptInput" placeholder="Paste YouTube script"></textarea>

<button onclick="generatePrompt()">Generate</button>

<div id="result" class="output"></div>

</div>

<script src="script.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>

</html>
